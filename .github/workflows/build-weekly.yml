name: Build Docker Image Weekly

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get latest tag
        id: get_tag
        run: |
          TARGET_REPO="pgvector/pgvector"
          LATEST_TAG=$(curl -s "https://api.github.com/repos/$TARGET_REPO/tags" | jq -r ".[0].name")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            PGVECTOR_TAG=${{ steps.get_tag.outputs.latest_tag }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pgvector-alpine:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
